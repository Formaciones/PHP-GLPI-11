<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Formaciones">
  <!-- Fondo cuadrado redondeado del icono. -->
  <rect width="64" height="64" rx="12" fill="#2454a6"/>
  <!-- Birrete: representa formacion/aprendizaje. -->
  <path d="M12 21 32 12l20 9-20 9-20-9Z" fill="#fff"/>
  <!-- Base del birrete o cuerpo academico. -->
  <path d="M20 29v12c0 4 6 8 12 8s12-4 12-8V29l-12 5-12-5Z" fill="#d9e7ff"/>
  <!-- Cordon lateral del birrete. -->
